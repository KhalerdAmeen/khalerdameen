<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>khalerdameen</title>
  <meta name="description" content="22yo founder. building & scaling brands.">
  <meta property="og:title" content="khalerdameen">
  <meta property="og:description" content="22yo founder. building & scaling brands.">
  <meta property="og:url" content="https://khalerdameen.com">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@khalerdameen">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @font-face {
      font-family: 'Ayuthaya';
      src: url('/fonts/Ayuthaya.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Ayuthaya', serif;
    }

    html, body {
      min-height: 100vh;
      width: 100%;
      background: #000000;
      font-family: 'Ayuthaya', serif;
      color: #C8922A;
      overflow-x: hidden;
    }

    .container {
      max-width: 380px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    .logo {
      display: block;
      margin: 0 auto;
    }

    .logo-text {
      font-size: 100px;
      color: #2D6A1F;
      text-shadow: 3px 3px 0px #8B1A1A, 1px 1px 0px #6B1111;
      line-height: 1;
    }

    .logo img {
      height: 130px;
      width: auto;
    }

    .tagline {
      margin-top: 60px;
      font-size: 13px;
      color: #C8922A;
      line-height: 1.8;
    }

    .projects {
      margin-top: 80px;
      font-size: 13px;
      line-height: 2;
    }

    .socials {
      margin-top: 60px;
      font-size: 13px;
      line-height: 2;
    }

    .socials-label {
      color: #C8922A;
      display: block;
    }

    footer {
      margin-top: 60px;
      font-size: 11px;
      color: #C8922A;
    }

    a {
      color: #C8922A;
      text-decoration: none;
      display: block;
    }

    a:hover {
      text-decoration: underline;
    }

    a:visited {
      color: #C8922A;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .block {
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @media (max-width: 380px) {
      .container {
        padding: 80px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="block logo" style="animation-delay: 0s;">
      <img src="public/logo.svg" height="130" alt="خالد" onerror="this.outerHTML='<span class=&quot;logo-text&quot;>خالد</span>'">
    </div>

    <div class="block tagline" style="animation-delay: 0.2s;">
      22yo founder.<br>
      building &amp; scaling brands
    </div>

    <div class="block projects" style="animation-delay: 0.4s;">
      <a href="https://khadstudio.co" target="_blank" rel="noopener">building Khad Studio</a>
      <a href="https://reelhouse.app" target="_blank" rel="noopener">building Reelhouse</a>
      <a href="https://nextstopai.app/" target="_blank" rel="noopener">building Nexstop</a>
      <a href="https://routn.lovable.app/" target="_blank" rel="noopener">building Routn</a>
      <a href="https://www.instagram.com/bykhvlerd/" target="_blank" rel="noopener">designed by khalerd.</a>
      <a href="https://www.behance.net/khaleedameen" target="_blank" rel="noopener">Creative Direction</a>
    </div>

    <div class="block socials" style="animation-delay: 0.6s;">
      <span class="socials-label">Let's connect</span>
      <a href="https://instagram.com/khalerdameen" target="_blank" rel="noopener">ig:@khalerdameen</a>
      <a href="https://x.com/khalerdameen" target="_blank" rel="noopener">X:@khalerdameen</a>
      <a href="https://youtube.com/@khalerddaily" target="_blank" rel="noopener">Youtube</a>
    </div>

    <footer class="block" style="animation-delay: 0.8s;">© khalerdameen 2026</footer>

  </div>
</body>
</html>
